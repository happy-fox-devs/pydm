<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      font-size: 13px;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #30363d;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 700;
      background: linear-gradient(135deg, #58a6ff, #3fb950);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header .version {
      font-size: 11px;
      color: #8b949e;
      padding: 2px 8px;
      background: #21262d;
      border-radius: 10px;
    }

    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .toggle-row label {
      font-weight: 500;
    }

    /* Toggle switch */
    .switch {
      position: relative;
      width: 44px;
      height: 24px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #30363d;
      border-radius: 24px;
      transition: 0.3s;
    }

    .slider::before {
      content: "";
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: #e6edf3;
      border-radius: 50%;
      transition: 0.3s;
    }

    input:checked + .slider {
      background: #1f6feb;
    }

    input:checked + .slider::before {
      transform: translateX(20px);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6e7681;
      transition: background 0.3s;
    }

    .status-dot.connected {
      background: #3fb950;
      box-shadow: 0 0 6px #3fb95060;
    }

    .status-dot.disconnected {
      background: #f85149;
    }

    .status-text {
      font-size: 12px;
      color: #8b949e;
    }

    .test-btn {
      width: 100%;
      padding: 10px;
      background: #21262d;
      color: #e6edf3;
      border: 1px solid #30363d;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .test-btn:hover {
      background: #30363d;
      border-color: #484f58;
    }

    .offline-banner {
      display: none;
      padding: 10px 14px;
      background: #f8514922;
      border: 1px solid #f8514944;
      border-radius: 10px;
      margin-bottom: 10px;
      font-size: 12px;
      color: #f85149;
      text-align: center;
    }

    .offline-banner.visible {
      display: block;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>⬇ PyDM</h1>
    <span class="version">v0.1.0</span>
  </div>

  <div class="toggle-row">
    <label for="enableToggle">Capture downloads</label>
    <label class="switch">
      <input type="checkbox" id="enableToggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="status" id="statusRow">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Checking connection...</span>
  </div>

  <button class="test-btn" id="testBtn">🔗 Test connection with PyDM</button>

  <div class="offline-banner" id="offlineBanner">
    ⚠ PyDM is not running. Start the application to capture downloads.
  </div>

  <script src="popup.js"></script>
</body>
</html>
